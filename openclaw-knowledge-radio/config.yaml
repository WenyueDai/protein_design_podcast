semantic_scholar:
  # API key is read from the S2_API_KEY environment variable (set in GitHub Actions secrets).
  # If the variable is absent or empty, all S2 enrichment is silently skipped.
  enrich_top_n: 60          # How many top-ranked candidates to enrich before final cut
  missed_min_citations: 5   # Min citation count for a reference to be surfaced as missed
  top_refs_per_paper: 8     # Top cited references to inject as related literature in synthesis

publish:
  enabled: true
  github_release_repo: "WenyueDai/protein_design_podcast"
  cleanup_intermediate: true

llm:
  enabled: true
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"
  analysis_model: "stepfun/step-3.5-flash:free"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.25
  max_output_tokens: 8192

ranking:
  # Papers whose titles contain any of these are treated as absolute priority
  # (same tier as tracked author feeds). Use for landmark tools / model families.
  absolute_title_keywords:
    - "AlphaFold"
    - "RoseTTAFold"
    - "ESMFold"
    - "RFdiffusion"
    - "ProteinMPNN"
    - "LigandMPNN"
    - "OpenFold"
    - "OmegaFold"
    - "Chai-1"
    - "Boltz"
    - "EvoDiff"
    - "Chroma"
    - "structure prediction"

  absolute_source_substrings:
    # Original
    - "sergey ovchinnikov"
    - "charlotte deane"
    - "jeffrey gray"
    - "noelia ferruz"
    - "debora marks"
    - "kevin yang"
    - "yaron lipman"
    # 🇺🇸 US — top priority
    - "david baker"
    - "tanja kortemme"
    - "william degrado"
    - "brian hie"
    - "brian trippe"
    - "alexander tong"
