pubmed:
  enabled: true
  email: "daiwenyueva@gmail.com"
  lookback_days: 2
  max_results_per_term: 30
  bucket: "protein"
  tags: ["pubmed", "journal", "biology"]
  search_terms:
    # Cat 1 — Reviews (core design areas)
    - "de novo protein design"
    - "computational protein design"
    - "protein design deep learning"
    - "peptide design machine learning"
    - "de novo peptide design"
    - "protein binder design"
    # Cat 2 — Model-based design (structure prediction)
    - "protein structure prediction deep learning"
    - "AlphaFold structure prediction"
    - "RoseTTAFold protein structure"
    - "protein hallucination design"
    # Cat 3 — Function to Scaffold (backbone/scaffold generation)
    - "protein backbone design diffusion"
    - "protein scaffold design generative"
    - "flow matching protein design"
    - "score-based protein structure generation"
    # Cat 4 — Scaffold to Sequence (inverse folding — biggest gap)
    - "inverse protein folding"
    - "fixed backbone protein sequence design"
    - "protein sequence design graph neural network"
    # Cat 5 — Function to Sequence
    - "protein language model"
    - "protein sequence generation generative"
    - "autoregressive protein design"
    - "diffusion model protein sequence"
    # Cat 6 — Function to Structure
    - "diffusion model protein structure"
    # Cat 7 — Other (PLM, fitness, mutations)
    - "protein representation learning"
    - "protein mutation effect prediction"
    - "protein fitness landscape"
    - "protein directed evolution machine learning"
    # Antibody design
    - "antibody design machine learning"
    - "antibody engineering computational"
    - "nanobody design"
    - "therapeutic antibody optimization"
