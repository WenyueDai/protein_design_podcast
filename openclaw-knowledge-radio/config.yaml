  # ── Blogs & Substacks ──────────────────────────────────────────────────────
  - name: "A-Alpha Bio (To Affinity And Beyond)"
    url: "https://aalphabio.substack.com/feed"
    tags: ["protein-design", "antibody-design", "substack", "author"]
    bucket: "protein"

  - name: "Owl Posting (Abhishaike Mahajan)"
    url: "https://www.owlposting.com/feed"
    tags: ["machine-learning", "biology", "substack", "author"]
    bucket: "ai_bio"

  - name: "Asimov Press"
    url: "https://www.asimov.press/feed"
    tags: ["biology", "science-writing", "substack", "author"]
    bucket: "ai_bio"

  - name: "BLOPIG (Oxford Protein Informatics Group)"
    url: "https://www.blopig.com/blog/feed/"
    tags: ["protein-design", "antibody-design", "structural-biology", "author"]
    bucket: "protein"

  - name: "In the Pipeline (Derek Lowe)"
    url: "https://www.science.org/digital-feed/pipeline"
    tags: ["drug-discovery", "biotech", "author"]
    bucket: "ai_bio"

pubmed:
  enabled: true
  email: "daiwenyueva@gmail.com"
  lookback_days: 2
  max_results_per_term: 30
  bucket: "protein"
  tags: ["pubmed", "journal", "biology"]
  search_terms:
    # Protein design — core
    - "protein design deep learning"
    - "de novo protein design"
    - "computational protein design"
    - "protein structure prediction"
    - "protein language model"
    - "diffusion model protein design"
    - "AlphaFold structure prediction"
    # Antibody design
    - "antibody design machine learning"
    - "antibody engineering computational"
    - "nanobody design"
    - "therapeutic antibody optimization"
    # Enzyme design
    - "enzyme design computational"
    - "enzyme engineering directed evolution"
    - "de novo enzyme design"
    # Protein engineering
    - "protein engineering stability"
    - "protein binder design"
    - "protein fitness landscape"
    - "protein directed evolution machine learning"

daily_knowledge:
  enabled: false

wiki_context:
  enabled: false

podcast:
  enabled: true
  target_minutes: 60
  voice: "en-GB-RyanNeural"
  voice_rate: "+35%"
  tts_chunk_chars: 2800
  chunking:
    fulltext_threshold_chars: 2500
    tierA_max: 999
    tierB_max: 999
    tierB_batch_size: 1
    deep_dive_max_tokens: 1800
    roundup_max_tokens: 1200
    use_merge_llm: false

publish:
  enabled: true
  github_release_repo: "WenyueDai/protein_design_podcast"
  cleanup_intermediate: true

llm:
  enabled: true
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"
  analysis_model: "stepfun/step-3.5-flash:free"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.25
  max_output_tokens: 8192

ranking:
  # Papers whose titles contain any of these are treated as absolute priority
  # (same tier as tracked author feeds). Use for landmark tools / model families.
  absolute_title_keywords:
    - "AlphaFold"
    - "RoseTTAFold"
    - "ESMFold"
    - "RFdiffusion"
    - "ProteinMPNN"
    - "OpenFold"
    - "OmegaFold"
    - "Chai-1"
    - "Boltz"
    - "structure prediction"

  absolute_source_substrings:
    - "sergey ovchinnikov"
    - "charlotte deane"
    - "jeffrey gray"
    - "noelia ferruz"
    - "debora marks"
    - "kevin yang"
    - "yaron lipman"

  source_priority_rules:
    - {contains: "nature biotechnology", priority: 1}
    - {contains: "nature chemical biology", priority: 1}
    - {contains: "nature structural", priority: 1}
    - {contains: "structure", priority: 2}
    - {contains: "pnas", priority: 2}
    - {contains: "nature (main journal)", priority: 2}
    - {contains: "protein science", priority: 3}
    - {contains: "arxiv", priority: 5}
    - {contains: "sciencedirect", priority: 6}

  # Items whose title or snippet contain any of these keywords are ranked
  # above other items of equal source quality.
  topic_boost_keywords:
    - "antibody design"
    - "antibody engineering"
    - "nanobody"
    - "enzyme design"
    - "enzyme engineering"
    - "directed evolution"
    - "de novo protein"
    - "protein binder"
    - "protein engineering"
    - "therapeutic antibody"
    - "protein language model"
    - "diffusion model"
    - "fitness landscape"
    - "protein fitness"
    - "AlphaFold"
    - "RoseTTAFold"
    - "ESMFold"
    - "ProteinMPNN"
    - "RFdiffusion"
    - "OpenFold"
    - "OmegaFold"
    - "Chai-1"
    - "Boltz"
