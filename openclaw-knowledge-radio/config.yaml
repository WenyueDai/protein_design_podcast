timezone: "Europe/London"
lookback_hours: 24

paths:
  data_dir: "data"
  output_dir: "output"
  state_dir: "state"

limits:
  max_items_total: 20
  max_items_protein: 18
  max_items_daily_knowledge: 5
  source_caps:
    "Endpoints News": 2
    "Nature (main journal)": 3
    "Nature Structural & Molecular Biology": 3
    "PNAS": 3
    "Structure": 3
  max_items_per_news_source: 1

excluded_terms:
  # Cell / molecular biology off-topic
  - "cell biology"
  - "single-cell"
  - "single cell"
  - "animal model"
  - "murine"
  - "mouse"
  - "mice"
  - "rat"
  - "zebrafish"
  - "drosophila"
  - "transposable element"
  - "hippocampal"
  - "neurogenesis"
  - "neural circuit"
  # Off-topic physical sciences
  - "superconductiv"
  - "quantum network"
  - "quantum optic"
  - "interferometry"
  # Administrative / non-research
  - "author correction"
  - "in this issue"
  - "retraction notice"

