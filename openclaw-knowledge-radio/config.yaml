timezone: "Europe/London"
lookback_hours: 24

paths:
  data_dir: "data"
  output_dir: "output"
  state_dir: "state"

limits:
  max_items_total: 40
  max_items_protein: 38
  max_items_daily_knowledge: 5
  source_caps:
    "Endpoints News": 2
    "Nature (main journal)": 3
    "Nature Structural & Molecular Biology": 3
    "PNAS": 3
    "Structure": 3
  max_items_per_news_source: 1

excluded_terms:
  # Cell / molecular biology off-topic
  - "cell biology"
  - "single-cell"
  - "single cell"
  - "animal model"
  - "murine"
  - "mouse"
  - "mice"
  - "rat"
  - "zebrafish"
  - "drosophila"
  - "transposable element"
  - "hippocampal"
  - "neurogenesis"
  - "neural circuit"
  # Off-topic physical sciences
  - "superconductiv"
  - "quantum network"
  - "quantum optic"
  - "interferometry"
  # Administrative / non-research
  - "author correction"
  - "in this issue"
  - "retraction notice"

rss_sources:
  # ── Core protein / structural biology ──────────────────────────────────────
  - name: "arXiv q-bio.BM"
    url: "https://arxiv.org/rss/q-bio.BM"
    tags: ["protein-design", "preprint", "arxiv"]
    bucket: "protein"

  - name: "Nature - Protein Design"
    url: "https://www.nature.com/subjects/protein-design.rss"
    tags: ["protein-design", "nature", "topic"]
    bucket: "protein"

  - name: "Nature - Protein Engineering"
    url: "https://www.nature.com/subjects/protein-engineering.rss"
    tags: ["protein-engineering", "nature", "topic"]
    bucket: "protein"

  - name: "Nature - Antibodies"
    url: "https://www.nature.com/subjects/antibodies.rss"
    tags: ["antibody-design", "nature", "topic"]
    bucket: "protein"

  - name: "Nature Structural & Molecular Biology"
    url: "https://www.nature.com/nsmb.rss"
    tags: ["structural-biology", "protein", "journal"]
    bucket: "protein"

  - name: "Nature (main journal)"
    url: "https://www.nature.com/nature/current_issue/rss"
    tags: ["nature", "journal"]
    bucket: "protein"

  - name: "arXiv q-bio.QM"
    url: "https://arxiv.org/rss/q-bio.QM"
    tags: ["quantitative-biology", "preprint", "arxiv"]
    bucket: "protein"

  - name: "Nature Methods"
    url: "https://www.nature.com/nmeth/current_issue/rss"
    tags: ["journal", "methods"]
    bucket: "protein"

  - name: "Protein Science"
    url: "https://onlinelibrary.wiley.com/feed/1469896x/most-recent"
    tags: ["protein"]
    bucket: "protein"

  - name: "Structure"
    url: "https://www.cell.com/structure/inpress.rss"
    tags: ["structural-biology", "protein", "journal"]
    bucket: "protein"

  # ── Top journals ───────────────────────────────────────────────────────────
  - name: "Nature Biotechnology"
    url: "https://www.nature.com/nbt.rss"
    tags: ["biotech", "journal"]
    bucket: "journal"

  - name: "Nature Chemical Biology"
    url: "https://www.nature.com/nchembio.rss"
    tags: ["chemical-biology", "journal"]
    bucket: "journal"

  - name: "PNAS"
    url: "https://www.pnas.org/rss/current.xml"
    tags: ["biology", "journal"]
    bucket: "journal"

  # ── AI / ML for biology ───────────────────────────────────────────────────
  - name: "arXiv cs.LG (AI/ML)"
    url: "https://arxiv.org/rss/cs.LG"
    tags: ["machine-learning", "arxiv"]
    bucket: "ai_bio"

  # ── Industry & news (capped) ───────────────────────────────────────────────
  - name: "Endpoints News"
    url: "https://endpts.com/feed/"
    tags: ["biotech", "industry"]
    bucket: "ai_bio"

  - name: "Quanta Magazine"
    url: "https://www.quantamagazine.org/feed/"
    tags: ["math", "science"]
    bucket: "daily"

  # ── Key researchers — protein / antibody / enzyme design ──────────────────
  # Note: URLs use HTTPS and are fetched via requests (not feedparser's built-in
  # fetcher) to avoid arXiv API 400 errors on HTTP→HTTPS redirects.
  - name: "Sergey Ovchinnikov (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Sergey+Ovchinnikov%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["protein-design", "author"]
    bucket: "protein"

  - name: "Brian Hie (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Brian+Hie%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["protein-LLM", "evolution", "author"]
    bucket: "protein"

  - name: "Charlotte Deane (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Charlotte+M.+Deane%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["antibody-design", "author"]
    bucket: "protein"

  - name: "Jeffrey Gray (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Jeffrey+J.+Gray%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["antibody-design", "rosetta", "author"]
    bucket: "protein"

  - name: "Noelia Ferruz (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Noelia+Ferruz%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["protein-LLM", "enzyme-design", "author"]
    bucket: "protein"

  - name: "Debora Marks (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Debora+Marks%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["protein-evolution", "fitness-landscape", "author"]
    bucket: "protein"

  - name: "Kevin Yang (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Kevin+K.+Yang%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["protein-engineering", "directed-evolution", "author"]
    bucket: "protein"

  - name: "Yaron Lipman (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Yaron+Lipman%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["diffusion", "protein-design", "author"]
    bucket: "protein"

  - name: "Jure Leskovec (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Jure+Leskovec%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["graph-learning", "bio-ml", "author"]
    bucket: "ai_bio"

  - name: "Regina Barzilay (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Regina+Barzilay%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["ai-biomed", "author"]
    bucket: "ai_bio"

  - name: "Bonnie Berger (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Bonnie+Berger%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
    tags: ["computational-biology", "author"]
    bucket: "ai_bio"

  - name: "Tommi Jaakkola (arXiv)"
    url: "https://export.arxiv.org/api/query?search_query=au:%22Tommi+Jaakkola%22&sortBy=submittedDate&sortOrder=descending&max_results=10"
