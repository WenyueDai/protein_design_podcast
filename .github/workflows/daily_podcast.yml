name: Daily Podcast

on:
  schedule:
    # Runs at 02:00 UTC every day (= 3am BST / 2am GMT)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Date to generate (YYYY-MM-DD, leave blank for today)"
        required: false
        default: ""
      force_republish:
        description: "Force regenerate even if episode exists"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    defaults:
      run:
        working-directory: openclaw-knowledge-radio

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for push back
          token: ${{ secrets.GH_PAT }}   # PAT with repo + workflow scopes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run daily pipeline
        env:
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TRANSCRIPT_DATABASE_ID: ${{ secrets.NOTION_TRANSCRIPT_DATABASE_ID }}
          VISITOR_MESSAGE_ENDPOINT: ${{ secrets.VISITOR_MESSAGE_ENDPOINT }}
          RUN_DATE:             ${{ github.event.inputs.run_date }}
          FORCE_REPUBLISH:      ${{ github.event.inputs.force_republish }}
        run: python run_daily.py

      - name: Process missed papers
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: 3165f58ea8c280498f72c770028aec0d
        run: python tools/process_missed_papers.py

      - name: Determine weekly/monthly schedule flags
        id: sched
        run: |
          python - <<'PYEOF'
          import os
          from datetime import date
          from calendar import monthrange

          run_date = os.environ.get("RUN_DATE") or ""
          today = date.fromisoformat(run_date) if run_date else date.today()

          # Sat=5 only — weekly briefing runs Saturday so it covers the full week.
          is_saturday = today.weekday() == 5

          last_day_of_month = monthrange(today.year, today.month)[1]
          is_month_end = today.day == last_day_of_month

          gh_output = os.environ["GITHUB_OUTPUT"]
          with open(gh_output, "a") as f:
              f.write(f"is_saturday={'true' if is_saturday else 'false'}\n")
              f.write(f"is_month_end={'true' if is_month_end else 'false'}\n")
          print(f"today={today} is_saturday={is_saturday} is_month_end={is_month_end}")
          PYEOF
        env:
          RUN_DATE: ${{ github.event.inputs.run_date }}

      - name: Run weekly deep-research briefing (Saturday only)
        if: steps.sched.outputs.is_saturday == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DEEPDIVE_DB_ID: 3165f58ea8c280498f72c770028aec0d
          NOTION_WEEKLY_SUMMARY_DB_ID: ${{ secrets.NOTION_WEEKLY_SUMMARY_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.S2_API_KEY }}
          RUN_DATE: ${{ github.event.inputs.run_date }}
        run: python tools/weekly_summary.py

      - name: Run speculative biology ideation (Saturday only)
        if: steps.sched.outputs.is_saturday == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SPECULATIVE_DB_ID: ${{ secrets.NOTION_SPECULATIVE_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_DATE: ${{ github.event.inputs.run_date }}
        run: python tools/speculative_ideas.py

      - name: Run monthly evolution report (last day of month only)
        if: steps.sched.outputs.is_month_end == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DEEPDIVE_DB_ID: 3165f58ea8c280498f72c770028aec0d
          NOTION_WEEKLY_SUMMARY_DB_ID: ${{ secrets.NOTION_WEEKLY_SUMMARY_DB_ID }}
          NOTION_MONTHLY_SUMMARY_DB_ID: ${{ secrets.NOTION_MONTHLY_SUMMARY_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_DATE: ${{ github.event.inputs.run_date }}
        run: python tools/monthly_evolution.py

      - name: Prune old output dirs (keep last 30 days)
        run: |
          python - <<'PYEOF'
          import shutil, time
          from pathlib import Path
          from datetime import date, timedelta
          cutoff = date.today() - timedelta(days=30)

          # Prune old output dirs
          for d in Path("output").iterdir():
              if not d.is_dir(): continue
              try:
                  if date.fromisoformat(d.name) < cutoff:
                      shutil.rmtree(d)
                      print(f"Pruned output/{d.name}")
              except ValueError:
                  pass

          # Prune old article analysis cache (keep last 30 days by mtime)
          cache_dir = Path("data/article_analysis")
          if cache_dir.exists():
              cutoff_ts = time.time() - 30 * 86400
              pruned = 0
              for f in cache_dir.iterdir():
                  if f.is_file() and f.stat().st_mtime < cutoff_ts:
                      f.unlink()
                      pruned += 1
              if pruned:
                  print(f"Pruned {pruned} stale analysis cache file(s)")
          PYEOF

      - name: Commit and push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update daily podcast site $(date -u +%Y-%m-%d)"
          git pull --no-rebase -X ours origin main
          git push origin main
